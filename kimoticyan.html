<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きもちちゃん</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #FFF8E7;
  height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

#title {
  position: fixed;
  top: 1.2rem;
  left: 0; right: 0;
  text-align: center;
  font-size: 1.1rem;
  color: #C89A10;
  letter-spacing: 0.2em;
  opacity: 0.7;
  z-index: 10;
}

#chara-wrap {
  position: fixed;
  top: 13%;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 160px;
  z-index: 10;
  transition: top 0.25s ease;
}
#chara-wrap svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 4px 12px rgba(230,184,0,0.25));
}
#chara-wrap svg.bounce { animation: bounce 0.4s ease; }
@keyframes bounce {
  0%   { transform: translateY(0); }
  30%  { transform: translateY(-10px); }
  60%  { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

#speech-bubble {
  position: fixed;
  top: calc(13% + 172px);
  left: 50%;
  transform: translateX(-50%);
  background: white;
  border: 2px solid #E6B800;
  border-radius: 18px;
  padding: 0.8rem 1.2rem;
  width: 280px;
  min-height: 52px;
  font-size: 0.95rem;
  color: #3a3a2a;
  line-height: 1.6;
  text-align: center;
  z-index: 10;
  transition: opacity 0.3s ease, top 0.25s ease;
}
#speech-bubble::before {
  content: '';
  position: absolute;
  top: -14px; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-bottom-color: #E6B800;
}
#speech-bubble::after {
  content: '';
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-bottom-color: white;
}

/* ── 共通 bottom-area ── */
#bottom-area {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  padding: 0.8rem 1rem 1.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  background: #FFF8E7;
  z-index: 20;
  transition: bottom 0.25s ease;
}

/* ── PC：テキスト入力 ── */
#input-area { display: flex; gap: 0.5rem; width: 100%; max-width: 340px; }
#user-input {
  flex: 1;
  min-width: 0;
  padding: 0.6rem 1rem;
  border: 2px solid #E6B800;
  border-radius: 999px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px;
  background: white;
  color: #3a3a2a;
  outline: none;
  transition: border-color 0.2s;
}
#user-input:focus { border-color: #C89A10; }
#send-btn {
  width: 44px; height: 44px;
  min-width: 44px;
  border-radius: 50%; border: none;
  background: #FFD966; cursor: pointer;
  font-size: 1.2rem;
  transition: background 0.2s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
#send-btn:hover { background: #E6B800; }
#send-btn:active { transform: scale(0.92); }

/* ── iPhone：ボタン選択 ── */
#btn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  width: 100%;
  max-width: 340px;
}
.mood-btn {
  padding: 0.55rem 0.3rem;
  border: 2px solid #E6B800;
  border-radius: 12px;
  background: white;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.78rem;
  color: #3a3a2a;
  cursor: pointer;
  text-align: center;
  line-height: 1.4;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.mood-btn:active {
  background: #FFF0B0;
  transform: scale(0.95);
}

/* ── 音声ボタン（共通） ── */
#voice-toggle {
  background: none;
  border: 1.5px solid #E6B800;
  border-radius: 999px;
  padding: 0.3rem 1rem;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.8rem;
  color: #C89A10;
  cursor: pointer;
  opacity: 0.8;
  transition: background 0.2s, opacity 0.2s;
}
#voice-toggle:hover { background: #FFF0B0; opacity: 1; }
#voice-toggle.muted { opacity: 0.4; }
</style>
</head>
<body>

<div id="title">きもちちゃん</div>

<div id="chara-wrap">
  <svg id="chara-svg" viewBox="0 0 116 120" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="speech-bubble">はじめまして！なんでも話しかけてね。</div>

<div id="bottom-area">
  <!-- PC用：テキスト入力 -->
  <div id="input-area">
    <input type="text" id="user-input" placeholder="メッセージを入力…" maxlength="100">
    <button id="send-btn">➤</button>
  </div>

  <!-- iPhone用：ボタン選択（初期非表示） -->
  <div id="btn-grid" style="display:none;">
    <!-- data-key="greeting" は時間帯で動的に内容が変わる -->
    <button class="mood-btn" id="btn-greeting" data-key="greeting">☀️ あいさつ</button>
    <button class="mood-btn" data-key="happy">😊 うれしい<br>たのしい<br>わくわく</button>
    <button class="mood-btn" data-key="tired">😔 つかれた<br>さみしい<br>こわい</button>
    <button class="mood-btn" data-key="thanks">🩷 ありがとう<br>すき<br>かわいい</button>
    <button class="mood-btn" data-key="angry">😤 むかつく<br>やばい<br>わからない</button>
    <button class="mood-btn" data-key="cheer">💪 がんばって<br>おなかすいた</button>
  </div>

  <button id="voice-toggle">🔊 音声オン</button>
</div>

<script>
// ── iOS判定（UA） ──
const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent);
if (isIOS) {
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('btn-grid').style.display = 'grid';
}

// ── 時間帯判定とあいさつボタン設定 ──
// 返り値: { icon, label, keyword, timeZone }
// 朝(5-10時): おはよう / 昼(10-17時): こんにちは / 夜(17-22時): こんばんは / 深夜(22-5時): おやすみ
function getGreetingConfig() {
  const hour = new Date().getHours(); // ローカル時刻（日本在住なのでJSTをそのまま使う）
  if (hour >= 5 && hour < 10)  return { icon: '🌅', label: 'おはよう',    keyword: 'おはよ' };
  if (hour >= 10 && hour < 17) return { icon: '☀️',  label: 'こんにちは', keyword: 'こんにちは' };
  if (hour >= 17 && hour < 22) return { icon: '🌆', label: 'こんばんは', keyword: 'こんばんは' };
  return                               { icon: '🌙', label: 'おやすみ',   keyword: 'おやすみ' };
}

// ボタンのラベルを初期化（iOSのみ表示されるが、計算自体は常に行う）
const greetingConfig = getGreetingConfig();
const greetingBtn = document.getElementById('btn-greeting');
// innerHTML で改行なし1行表示（あいさつは1語で十分）
greetingBtn.innerHTML = greetingConfig.icon + '&nbsp;' + greetingConfig.label;

// ── visualViewport（PC Safari / iPhone Safari 両対応） ──
const charaWrap = document.getElementById('chara-wrap');
const bubbleEl  = document.getElementById('speech-bubble');
const bottomEl  = document.getElementById('bottom-area');

function onViewportResize() {
  const vv = window.visualViewport;
  if (!vv) return;
  const kbHeight = window.innerHeight - vv.height - vv.offsetTop;
  bottomEl.style.bottom = Math.max(0, kbHeight) + 'px';
  if (kbHeight > 100) {
    charaWrap.style.top    = '6%';
    bubbleEl.style.display = 'none';
  } else {
    charaWrap.style.top    = '13%';
    bubbleEl.style.display = '';
    bubbleEl.style.top     = 'calc(13% + 172px)';
  }
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

// ── 音声設定（パターンB：rate 1.0 / pitch 1.6）──
let voiceEnabled = true;

function speak(text) {
  if (!voiceEnabled) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = 'ja-JP';
  utter.rate  = 1.0;
  utter.pitch = 1.6;
  window.speechSynthesis.speak(utter);
}

const voiceBtn = document.getElementById('voice-toggle');
voiceBtn.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceBtn.textContent = voiceEnabled ? '🔊 音声オン' : '🔇 音声オフ';
  voiceBtn.classList.toggle('muted', !voiceEnabled);
  if (!voiceEnabled) window.speechSynthesis.cancel();
});

const DEFAULT_RESPONSES = {
  emotion: 'normal',
  phrases: ['そうなんだ！','うんうん。','なるほど〜！','もっと聞かせて！','ふむふむ。','そっかあ。','へえ〜！','それでそれで？','うん、聞いてるよ。','そういうこともあるよね。','ほんとに？','そっかそっか。']
};

const svg    = document.getElementById('chara-svg');
const bubble = document.getElementById('speech-bubble');
const input  = document.getElementById('user-input');
const btn    = document.getElementById('send-btn');

function setFace(key) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  FACES[key].render(g);
  svg.innerHTML = '';
  svg.appendChild(g);
}

function bounce() {
  svg.classList.remove('bounce');
  void svg.offsetWidth;
  svg.classList.add('bounce');
  svg.addEventListener('animationend', () => svg.classList.remove('bounce'), { once: true });
}

function getResponse(text) {
  for (const rule of RESPONSES) {
    if (rule.keywords.some(k => text.includes(k))) return rule;
  }
  return DEFAULT_RESPONSES;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function reply(text) {
  if (!text.trim()) return;
  const res    = getResponse(text);
  const phrase = pick(res.phrases);
  setFace(res.emotion);
  bounce();
  bubble.style.opacity = '0';
  setTimeout(() => {
    bubble.textContent  = phrase;
    bubble.style.opacity = '1';
    speak(phrase);
  }, 200);
}

// PC：テキスト入力
btn.addEventListener('click', () => { reply(input.value); input.value = ''; input.focus(); });
input.addEventListener('keydown', e => { if (e.key === 'Enter') { reply(input.value); input.value = ''; } });

// iPhone：ボタン選択
document.querySelectorAll('.mood-btn').forEach(b => {
  b.addEventListener('click', () => {
    const keyword = BTN_KEYWORDS[b.dataset.key] || '';
    reply(keyword);
  });
});

setFace('normal');
</script>
</body>
</html>
