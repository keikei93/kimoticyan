<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きもちちゃん</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #FFF8E7;
  height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}
#title {
  position: fixed;
  top: 1.2rem;
  left: 0; right: 0;
  text-align: center;
  font-size: 1.1rem;
  color: #C89A10;
  letter-spacing: 0.2em;
  opacity: 0.7;
  z-index: 10;
}
#chara-wrap {
  position: fixed;
  top: 13%;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 160px;
  z-index: 10;
  transition: top 0.25s ease;
}
#chara-wrap svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 4px 12px rgba(230,184,0,0.25));
}
#chara-wrap svg.bounce { animation: bounce 0.4s ease; }
@keyframes bounce {
  0%   { transform: translateY(0); }
  30%  { transform: translateY(-10px); }
  60%  { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}
#speech-bubble {
  position: fixed;
  top: calc(13% + 172px);
  left: 50%;
  transform: translateX(-50%);
  background: white;
  border: 2px solid #E6B800;
  border-radius: 18px;
  padding: 0.8rem 1.2rem;
  width: 280px;
  min-height: 52px;
  font-size: 0.95rem;
  color: #3a3a2a;
  line-height: 1.6;
  text-align: center;
  z-index: 10;
  transition: opacity 0.3s ease, top 0.25s ease;
}
#speech-bubble::before {
  content: '';
  position: absolute;
  top: -14px; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-bottom-color: #E6B800;
}
#speech-bubble::after {
  content: '';
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-bottom-color: white;
}
#bottom-area {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  padding: 0.8rem 1rem 1.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  background: #FFF8E7;
  z-index: 20;
  transition: bottom 0.25s ease;
}
#input-area { display: flex; gap: 0.5rem; width: 100%; max-width: 340px; }
#user-input {
  flex: 1;
  min-width: 0;
  padding: 0.6rem 1rem;
  border: 2px solid #E6B800;
  border-radius: 999px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px;
  background: white;
  color: #3a3a2a;
  outline: none;
  transition: border-color 0.2s;
}
#user-input:focus { border-color: #C89A10; }
#send-btn {
  width: 44px; height: 44px;
  min-width: 44px;
  border-radius: 50%; border: none;
  background: #FFD966; cursor: pointer;
  font-size: 1.2rem;
  transition: background 0.2s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
#send-btn:hover { background: #E6B800; }
#send-btn:active { transform: scale(0.92); }
#btn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  width: 100%;
  max-width: 340px;
}
.mood-btn {
  padding: 0.55rem 0.3rem;
  border: 2px solid #E6B800;
  border-radius: 12px;
  background: white;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.88rem;
  color: #3a3a2a;
  cursor: pointer;
  text-align: center;
  line-height: 1.4;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.mood-btn:active { background: #FFF0B0; transform: scale(0.95); }
#voice-toggle {
  background: none;
  border: 1.5px solid #E6B800;
  border-radius: 999px;
  padding: 0.3rem 1rem;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.8rem;
  color: #C89A10;
  cursor: pointer;
  opacity: 0.8;
  transition: background 0.2s, opacity 0.2s;
}
#voice-toggle:hover { background: #FFF0B0; opacity: 1; }
#voice-toggle.muted { opacity: 0.4; }
</style>
</head>
<body>

<div id="title">きもちちゃん</div>
<div id="chara-wrap">
  <svg id="chara-svg" viewBox="0 0 116 120" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div id="speech-bubble">はじめまして！なんでも話しかけてね。</div>

<div id="bottom-area">
  <div id="input-area">
    <input type="text" id="user-input" placeholder="メッセージを入力…" maxlength="100">
    <button id="send-btn">➤</button>
  </div>
  <div id="btn-grid" style="display:none;">
    <!-- ラベルはJSで初期設定・押すたびに入れ替わる -->
    <button class="mood-btn" data-key="greeting"></button>
    <button class="mood-btn" data-key="happy"></button>
    <button class="mood-btn" data-key="tired"></button>
    <button class="mood-btn" data-key="thanks"></button>
    <button class="mood-btn" data-key="angry"></button>
    <button class="mood-btn" data-key="scared"></button>
  </div>
  <button id="voice-toggle">🔊 音声オン</button>
</div>

<script>
// ── iOS判定 ──
const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent);
if (isIOS) {
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('btn-grid').style.display = 'grid';
}

// ── 時間帯判定 ──
function getGreetingConfig() {
  const hour = new Date().getHours();
  if (hour >= 5  && hour < 10) return { label: 'おはよう',    keyword: 'おはよ' };
  if (hour >= 10 && hour < 17) return { label: 'こんにちは',  keyword: 'こんにちは' };
  if (hour >= 17 && hour < 22) return { label: 'こんばんは',  keyword: 'こんばんは' };
  return                               { label: 'おやすみ',    keyword: 'おやすみ' };
}
const greetingConfig = getGreetingConfig();

// ── ボタン定義：各ボタンのラベル候補とキーワード候補 ──
// labelPool: 押すたびにランダムで1語表示
// keywordPool: そのラベルに対応するキーワード（同じ順番）
// labelPool と keywordPool は同じ長さ・同じ順で対応させる
const BTN_CONFIG = {
  greeting: {
    // あいさつだけは時間帯で最初のラベルを固定、残りをローテ
    labelPool:   ['おはよう', 'こんにちは', 'こんばんは', 'おやすみ'],
    keywordPool: ['おはよ',   'こんにちは', 'こんばんは', 'おやすみ'],
    // 時間帯に合わせた初期インデックス
    initLabel: greetingConfig.label,
    initKeyword: greetingConfig.keyword,
  },
  happy: {
    labelPool:   ['うれしい', 'たのしい', 'わくわく', 'さいこう', 'やった'],
    keywordPool: ['うれしい', 'たのしい', 'わくわく', '最高',     'やった'],
  },
  tired: {
    labelPool:   ['つかれた', 'しんどい', 'だるい', 'へとへと'],
    keywordPool: ['つかれた', 'しんどい', 'だるい', 'へとへと'],
  },
  thanks: {
    labelPool:   ['ありがとう', 'すき', 'かわいい', 'だいすき'],
    keywordPool: ['ありがとう', 'すき', 'かわいい', 'だいすき'],
  },
  angry: {
    labelPool:   ['むかつく', 'いらいら', 'やばい', 'わからない', 'さみしい'],
    keywordPool: ['むかつく', 'いらいら', 'やばい', 'わからない', 'さみしい'],
  },
  scared: {
    labelPool:   ['こわい', 'びっくり', 'おどろいた', 'やばい'],
    keywordPool: ['こわい', 'びっくり',  'おどろ',    'やばい'],
  },
};

// ── ボタン初期ラベルを設定 ──
// 各ボタンに現在の表示インデックスを持たせる
const btnEls = {};
document.querySelectorAll('.mood-btn').forEach(b => {
  const key = b.dataset.key;
  const cfg = BTN_CONFIG[key];
  btnEls[key] = b;

  if (key === 'greeting') {
    // 時間帯に合わせた語を初期表示
    b.textContent = cfg.initLabel;
    // インデックスは labelPool 内の位置を探す
    const idx = cfg.labelPool.indexOf(cfg.initLabel);
    b.dataset.idx = idx >= 0 ? idx : 0;
  } else {
    b.dataset.idx = 0;
    b.textContent = cfg.labelPool[0];
  }
});

// ── ラベルを次の語に更新（押した後に呼ぶ） ──
function rotateBtnLabel(b) {
  const key = b.dataset.key;
  const cfg = BTN_CONFIG[key];
  const pool = cfg.labelPool;
  // 現在と違う語をランダムで選ぶ（同じ語が連続しないように）
  let nextIdx;
  const curIdx = parseInt(b.dataset.idx, 10);
  if (pool.length === 1) return; // 1語しかない場合は変えない
  do {
    nextIdx = Math.floor(Math.random() * pool.length);
  } while (nextIdx === curIdx);
  b.dataset.idx = nextIdx;
  b.textContent = pool[nextIdx];
}

// ── visualViewport ──
const charaWrap = document.getElementById('chara-wrap');
const bubbleEl  = document.getElementById('speech-bubble');
const bottomEl  = document.getElementById('bottom-area');

function onViewportResize() {
  const vv = window.visualViewport;
  if (!vv) return;
  const kbHeight = window.innerHeight - vv.height - vv.offsetTop;
  bottomEl.style.bottom = Math.max(0, kbHeight) + 'px';
  if (kbHeight > 100) {
    charaWrap.style.top    = '6%';
    bubbleEl.style.display = 'none';
  } else {
    charaWrap.style.top    = '13%';
    bubbleEl.style.display = '';
    bubbleEl.style.top     = 'calc(13% + 172px)';
  }
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

// ── 音声設定 ──
let voiceEnabled = true;
let speechReady  = false;

function speak(text) {
  if (!voiceEnabled) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = 'ja-JP';
    utter.rate  = 1.0;
    utter.pitch = 1.6;
    window.speechSynthesis.speak(utter);
  }, 50);
}

function warmUpSpeech() {
  if (speechReady) return;
  speechReady = true;
  const warmUp = new SpeechSynthesisUtterance('');
  warmUp.volume = 0;
  window.speechSynthesis.speak(warmUp);
}

if (isIOS) {
  document.getElementById('btn-grid').addEventListener('click', warmUpSpeech, { once: true });
} else {
  document.getElementById('send-btn').addEventListener('click', warmUpSpeech, { once: true });
  document.getElementById('user-input').addEventListener('keydown', warmUpSpeech, { once: true });
}

const voiceBtn = document.getElementById('voice-toggle');
voiceBtn.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceBtn.textContent = voiceEnabled ? '🔊 音声オン' : '🔇 音声オフ';
  voiceBtn.classList.toggle('muted', !voiceEnabled);
  if (!voiceEnabled) window.speechSynthesis.cancel();
});

const DEFAULT_RESPONSES = {
  emotion: 'normal',
  phrases: [
    'そうなんだ！','うんうん。','なるほど〜！','もっと聞かせて！',
    'ふむふむ。','そっかあ。','へえ〜！','それでそれで？',

    'なるほどねえ。','それは気になるね！','うんうん、続けて。','そうだったんだ〜。'
  ]
};

const svg    = document.getElementById('chara-svg');
const bubble = document.getElementById('speech-bubble');
const input  = document.getElementById('user-input');
const btn    = document.getElementById('send-btn');

function setFace(key) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  FACES[key].render(g);
  svg.innerHTML = '';
  svg.appendChild(g);
}

function bounce() {
  svg.classList.remove('bounce');
  void svg.offsetWidth;
  svg.classList.add('bounce');
  svg.addEventListener('animationend', () => svg.classList.remove('bounce'), { once: true });
}

function getResponse(text) {
  for (const rule of RESPONSES) {
    if (rule.keywords.some(k => text.includes(k))) return rule;
  }
  return DEFAULT_RESPONSES;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function reply(text) {
  if (!text.trim()) return;
  const res    = getResponse(text);
  const phrase = pick(res.phrases);
  setFace(res.emotion);
  bounce();
  bubble.style.opacity = '0';
  setTimeout(() => {
    bubble.textContent   = phrase;
    bubble.style.opacity = '1';
    speak(phrase);
  }, 200);
}

// PC：テキスト入力
btn.addEventListener('click', () => { reply(input.value); input.value = ''; input.focus(); });
input.addEventListener('keydown', e => { if (e.key === 'Enter') { reply(input.value); input.value = ''; } });

    reply(keyword);

    if (key !== 'greeting') rotateBtnLabel(b);
  });
});
